name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build --stacktrace

      # The corpus report is the project's headline claim. Keeping it in the build log means the
      # numbers in the README can always be checked against a real run.
      - name: Near-miss corpus report
        run: ./gradlew :kmemo-core:test --tests '*NearMissCorpusTest*' --rerun-tasks

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: kmemo-core/build/reports/tests/test
